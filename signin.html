<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BioTech Labs</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #020617;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            color: #f8fafc;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 460px;
            padding: 3.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            z-index: 10;
            overflow: hidden;
            animation: cardAppear 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #3b82f6, #8b5cf6, transparent);
        }

        .logo-container {
            width: auto;
            height: auto;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        select,
        input {
            width: 100%;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.2);
            color: #ffffff;
            backdrop-filter: blur(10px);
        }

        select option {
            background: #0f172a;
            color: white;
        }

        input:focus,
        select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        .password-container {
            position: relative;
        }

        .field-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }

        input.with-icon {
            padding-left: 2.8rem;
        }

        .eye-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            cursor: pointer;
            transition: color 0.3s;
        }

        .eye-icon:hover {
            color: #cbd5e1;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #cbd5e1;
            font-weight: 500;
        }

        .forgot-link {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: #93c5fd;
        }

        .login-btn {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        .login-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(rgba(255, 255, 255, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4);
        }

        .login-btn:hover::after {
            opacity: 1;
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(124, 58, 237, 0.3);
        }

        .signup-text {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-top: 2rem;
        }

        .signup-link {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signup-link:hover {
            color: #93c5fd;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div style="position: absolute; top: 2rem; left: 2rem; z-index: 20;">
        <a href="index.html" class="btn"
            style="background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); color: #f8fafc; text-decoration: none; padding: 0.6rem 1.2rem; border-radius: 12px; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; transition: background 0.3s;"
            onmouseover="this.style.background='rgba(30, 41, 59, 0.8)'"
            onmouseout="this.style.background='rgba(15, 23, 42, 0.6)'">
            🏠 Home
        </a>
    </div>
    <div class="login-card">
        <div class="logo-container"
            style="background: transparent; box-shadow: none; width: auto; height: auto; margin-bottom: 2rem;">
            <img src="logo1.webp.png" alt="Stackly BioTech" style="width: 220px; transition: transform 0.3s ease;"
                onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Login to access your BioTech Labs account</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Login As</label>
                <select id="roleSelect" required>
                    <option value="administrator">Admin</option>
                    <option value="researcher">Researchers</option>
                    <option value="patient">Patient</option>
                </select>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="password-container">
                    <span class="field-icon">✉️</span>
                    <input type="email" id="email" class="with-icon" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-container">
                    <span class="field-icon">🔒</span>
                    <input type="password" id="password" class="with-icon" placeholder="••••••••" required>
                    <span class="eye-icon">👁️</span>
                </div>
            </div>

            <div class="remember-forgot">
                <label class="remember-me">
                    <input type="checkbox" style="width: auto; margin: 0;"> Remember me
                </label>
                <a href="404.html" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Login to Dashboard</button>
        </form>

        <p class="signup-text">Don't have an account? <a href="signup.html" class="signup-link">Sign up</a></p>


    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const role = document.getElementById('roleSelect').value;
            // Redirect to dashboard with selected role
            window.location.href = `dashboard.html?role=${role}`;
        });
    </script>
</body>

</html>
